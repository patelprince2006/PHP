<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <!-- Defs for gradients -->
  <defs>
    <linearGradient id="skyGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#4fc3f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288d1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="mountainGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#cfd8dc;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#546e7a;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Compass Outer Ring -->
  <circle cx="100" cy="100" r="95" fill="#ffc107" />
  <circle cx="100" cy="100" r="85" fill="#ffffff" />
  
  <!-- Compass Points -->
  <path d="M100 5 L115 50 L100 85 L85 50 Z" fill="#ffc107" stroke="#b00020" stroke-width="1"/>
  <path d="M100 195 L115 150 L100 115 L85 150 Z" fill="#ffc107" stroke="#b00020" stroke-width="1"/>
  <path d="M5 100 L50 115 L85 100 L50 85 Z" fill="#ffc107" stroke="#b00020" stroke-width="1"/>
  <path d="M195 100 L150 115 L115 100 L150 85 Z" fill="#ffc107" stroke="#b00020" stroke-width="1"/>

  <!-- Inner Circle Background (Sky) -->
  <circle cx="100" cy="100" r="80" fill="url(#skyGradient)" />

  <!-- Sun/Moon -->
  <circle cx="140" cy="60" r="10" fill="#fff9c4" opacity="0.8" />

  <!-- Mountains -->
  <path d="M40 150 L80 80 L120 150 Z" fill="url(#mountainGradient)" />
  <path d="M90 150 L130 60 L170 150 Z" fill="#90a4ae" />
  <path d="M80 80 L95 105 L65 105 Z" fill="#ffffff" /> <!-- Snow cap left -->
  <path d="M130 60 L145 90 L115 90 Z" fill="#ffffff" /> <!-- Snow cap right -->

  <!-- Water/Lake at bottom -->
  <path d="M20 150 Q100 160 180 150 L180 180 Q100 190 20 180 Z" fill="#0277bd" opacity="0.8"/>

  <!-- Airplane and Trail -->
  <path d="M30 120 Q60 80 90 50" stroke="white" stroke-width="3" stroke-dasharray="5,5" fill="none" opacity="0.7"/>
  <path d="M90 50 L95 40 L105 45 L102 50 L108 52 L105 55 L95 52 Z" fill="white" transform="rotate(45 99 48)"/>
   <!-- Simple plane shape -->
   <g transform="translate(90, 40) rotate(-45) scale(0.6)">
     <path d="M20 10 L40 25 L35 30 L20 20 L10 30 L5 25 L20 10Z" fill="white"/>
   </g>

</svg>
